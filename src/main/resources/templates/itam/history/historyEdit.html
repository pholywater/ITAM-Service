<!DOCTYPE HTML>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/serverSideLayout}"
      layout:fragment="Content"
>

<head>
    <title>History Edit</title>
    <!-- 엔터 Submit 방지 -->
    <script>
        document.addEventListener('keydown', function(event) {
          if (event.keyCode === 13) {
            event.preventDefault();
          };
        }, true);
    </script>
    <link rel="stylesheet" type="text/css" href="css/datatables/dataTables.css"/>
    <link rel="stylesheet" type="text/css"
          href="css/datatables/responsive.dataTables.min.css"/>
    <link rel="stylesheet" type="text/css" href="css/datatables/jquery.dataTables.min-1.13.7.css"/>
    <link rel="stylesheet" type="text/css" href="css/datatables/buttons.dataTables.min-2.4.2.css"/>
    <script src="jquery/jquery-3.7.0.js"></script>
    <script src="js/datatables/dataTables-1.13.7.js"></script>
    <script src="js/datatables/dataTables.buttons.min.js"></script>
    <script src="js/datatables/jszip.min-3.10.1.js"></script>
    <script src="js/datatables/pdfmake.min.js"></script>
    <script src="js/datatables/vfs_fonts.js"></script>
    <script src="js/datatables/buttons.html5.min-2.4.2.js"></script>
    <script src="js/datatables/buttons.print.min-2.4.2.js"></script>
    <script src="js/datatables/dataTables.fixedColumns.min.js"></script>
    <script src="js/datatables/dataTables.responsive.min.js"></script>
</head>

<body>
<div class="container-fluid" id="myDiv">
    <div class="container-fluid" style="margin-top:20px; margin-bottom: 10px;">
        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/historyUpdate}" th:object="${historyVo}" method="post">
            <!--<input type="hidden" th:field="*{idx}"/>-->

            <div class="row align-items-start">
                <div class="col">
                    <h5>요청자 정보</h5>
                    <div class="form-floating">
                        <input type="text" class="form-control mb-1" th:field="*{historyRequester}" required/>
                        <label th:for="historyRequester">요청자(성명 기입) :</label>
                    </div>
                    <div class="form-floating">
                        <input type="search" list="memberName" class="form-control mb-1"
                               th:field="*{historyMemberId}" required/>
                        <datalist id="memberName">
                            <option th:each="m : ${memberList}" th:value="${m.memberId}"
                                    th:label="|${m.memberName} / ${m.departmentFloor} / ${m.memberDepartment}|">
                        </datalist>
                        <label th:for="historyMemberId">실 사용자(hmm####)</label>
                    </div>
                    <div class="form-floating">
                        <input type="text" class="form-control mb-1" th:field="*{idx}" readonly/>
                        <label th:for="idx">변경 할 Code</label>
                    </div>
                </div>

                <div class="col">
                    <h5>요청 및 처리 일시</h5>
                    <div class="form-floating">
                        <input type="date" class="form-control mb-1" th:field="*{historyRequestDate}" required/>
                        <label th:for="historyRequestDate">요청 일시 :</label>
                    </div>
                    <div class="form-floating">
                        <input type="date" class="form-control mb-1" th:field="*{historyCompletionDate}" required/>
                        <label th:for="historyCompletionDate">처리 일시 :</label>
                    </div>
                    <div class="form-floating">
                        <select class="form-control mb-1" th:field="*{historyType}" required>
                            <option value="">클릭 후 선택</option>
                            <option th:value="출고">출고</option>
                            <option th:value="입고">입고</option>
                            <option th:value="고장">고장</option>
                            <option th:value="수리">수리</option>
                            <option th:value="변경">변경</option>
                        </select>
                        <label th:for="historyType">이력 관리 구분 :</label>
                    </div>
                </div>

                <div class="col">
                    <h5>요청 내용</h5>
                    <div class="form-floating">

                        <input type="search" list="assetList" class="form-control mb-1"
                               th:field="*{historyAssetNumber}" required/>
                        <datalist id="assetList">
                            <option th:each="a : ${assetList}" th:value="${a.assetNumber}"
                                    th:label="|${a.statusAssetUsage} / ${a.statusAssetEtc1} / ${a.memberName}/ ${a.memberId} / ${a.departmentFloor} / ${a.assetModelName} / ${a.statusAssetSpec3}|">
                        </datalist>
                        <label th:for="historyAssetNumber">장비 번호 입력</label>

                    </div>
                    <!--<div class="form-floating">
                        <select th:field="*{historyAssetNumber}" class="form-control mb-1" required>
                            <option value="">클릭 후 선택</option>
                            <option th:each="type : ${T(hmm.itam.dto.AssetSupplies).values()}"
                                    th:value="${type.code}" th:text="${type.description}"></option>
                        </select>
                        <label>소모품 선택</label>
                    </div>-->
                    <div class="form-floating">
                        <select class="form-control mb-1" th:field="*{historyAssetType}" required>
                            <option value="">클릭 후 선택</option>
                            <option th:value="소모품">소모품</option>
                            <option th:value="장비">장비</option>
                            <option th:value="기타">기타</option>
                        </select>
                        <label th:for="historyAssetType">이력 등록 품목 :</label>
                    </div>
                    <div class="form-floating">
                        <select class="form-control mb-1" th:field="*{historyRequestUsage}" required>
                            <option value="">클릭 후 선택</option>
                            <option th:value="업무용">업무용</option>
                            <option th:value="대여용">대여용</option>
                            <option th:value="공용">공용</option>
                            <option th:value="재고">재고</option>
                            <option th:value="기타">기타</option>
                            <option th:value="미반납장비">미반납장비</option>
                        </select>
                        <label th:for="historyRequestUsage">이력 관리 발생 용도 :</label>
                    </div>
                </div>

                <div class="col">
                    <h5>작업 정보</h5>
                    <div class="form-floating">
                        <input type="text" class="form-control mb-1" th:field="*{historyWorker}" required/>
                        <label th:for="historyWorker">작업자 :</label>
                    </div>
                    <div class="form-floating">
                        <input type="text" class="form-control mb-1" th:field="*{historyRequestDetails}" required/>
                        <label th:for="historyRequestDetails">이력 관리 등록 내용 :</label>
                    </div>
                    <div class="form-floating">
                        <input type="text" class="form-control mb-1" th:field="*{historyRequestEtc}"/>
                        <label th:for="historyRequestEtc">비고 내용 :</label>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-success">수정 완료</button>
                <a th:href="@{/historyAdd}" class="btn btn-primary">등록 화면</a>
                <button type="submit" class="btn btn-secondary mb-1"
                        formaction="/historyList" formmethod="post" formnovalidate>
                    리스트 조회
                </button>
            </div>
        </form>
    </div>
    <hr>
    <table id="myTable" class="display">
        <thead>
        <tr>
            <th>No.</th>
            <th>처리 일시</th>
            <th>요청 일시</th>
            <th>구분</th>
            <th>입출고</th>
            <th>요청자</th>
            <th>작업자</th>
            <th>사번</th>
            <th>부서</th>
            <th>이름</th>
            <th>직급</th>
            <th>장비번호</th>
            <th>모델명</th>
            <th>요청 내용</th>
            <th>비고 내용</th>
            <th>Code</th>
            <th>수정</th>
            <th>삭제</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u, stat :${list}">
            <td th:text="${stat.count}"></td>
            <td th:text="${#dates.format(u.historyCompletionDate, 'yyyy-MM-dd')}"></td>
            <td th:text="${#dates.format(u.historyRequestDate, 'yyyy-MM-dd')}"></td>
            <td th:text="${u.historyAssetType}"></td>
            <td th:text="${u.historyType}"></td>
            <td th:text="${u.historyRequester}"></td>
            <td th:text="${u.historyWorker}"></td>
            <td th:text="${u.historyMemberId}"></td>
            <td th:text="${u.departmentName}"></td>
            <td th:text="${u.memberName}"></td>
            <td th:text="${u.memberRank}"></td>
            <td th:text="${u.historyAssetNumber}"></td>
            <td th:text="${u.assetModelName}"></td>
            <td th:text="${u.historyRequestDetails}"></td>
            <td th:text="${u.historyRequestEtc}"></td>
            <td th:text="${u.idx}"></td>
            <td>
                <a th:href="@{/historyEdit(idx=${u.idx})}" class="btn btn-sm btn-warning">수정</a>
            </td>
            <td>
                <form th:action="@{/historyDelete}" method="post">
                    <input type="hidden" name="idx" th:value="${u.idx}"/>
                    <input type="hidden" name="historyAssetNumber" th:value="${u.historyAssetNumber}"/>
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('정말 삭제하시겠습니까?');">삭제
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    $(document).ready(function() {
    document.getElementById("myDiv").style.display = "block";
    $('#myTable').DataTable( {
        dom: 'Bfrtip',
        lengthMenu: [
            [ 5, 10, 25, 50, 100, -1 ],
            [ '5 rows', '10 rows', '25 rows', '50 rows', '100 rows', 'Show all' ]
        ],
        iDisplayLength : 5,
        buttons: [
            'pageLength'
        ],
        columnDefs: [
            {
            className: 'dtr-control',
            orderable: false,
            targets: 0
            }
        ]
    } );
} );
</script>
</body>
</html>
